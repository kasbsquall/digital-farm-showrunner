<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="800" viewBox="0 0 1240 800" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <style>
      .title { font-size: 15px; font-weight: 700; fill: #2b2118; }
      .sub { font-size: 11px; fill: #6b5d4a; }
      .lbl { font-size: 11px; font-weight: 600; fill: #2b2118; }
      .edge { font-size: 10.5px; fill: #4c4033; }
      .box { fill: #fffdf8; stroke: #2b2118; stroke-width: 2; }
      .agent { fill: #fff7e4; stroke: #e0a92e; stroke-width: 1.8; }
      .cloud { fill: #eef4f7; stroke: #6ba7c4; stroke-width: 2; }
      .store { fill: #eef4ea; stroke: #4f7942; stroke-width: 2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2b2118"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3d7d99"/>
    </marker>
  </defs>

  <rect width="1240" height="800" fill="#f6efe2"/>

  <!-- Header -->
  <text x="40" y="48" class="title" font-size="24">The Digital Farm Showrunner — Arquitectura</text>
  <text x="40" y="72" class="sub" font-size="13">Qwen Cloud Hackathon 2026 · Track 2: AI Showrunner · pipeline autónomo de 4 agentes</text>
  <line x1="40" y1="86" x2="1200" y2="86" stroke="#2b2118" stroke-width="2"/>

  <!-- User -->
  <rect x="60" y="130" width="150" height="70" rx="12" class="box"/>
  <text x="135" y="163" text-anchor="middle" class="title">👤 Usuario</text>
  <text x="135" y="182" text-anchor="middle" class="sub">navegador</text>

  <!-- Frontend -->
  <rect x="60" y="300" width="150" height="90" rx="12" class="box"/>
  <text x="135" y="333" text-anchor="middle" class="title">Frontend</text>
  <text x="135" y="352" text-anchor="middle" class="sub">Next.js</text>
  <text x="135" y="370" text-anchor="middle" class="sub">feed de episodios</text>

  <!-- Backend big container -->
  <rect x="300" y="120" width="560" height="560" rx="18" fill="#ffffff" stroke="#2b2118" stroke-width="2.5" stroke-dasharray="2 0"/>
  <rect x="300" y="120" width="560" height="42" rx="18" fill="#2b2118"/>
  <rect x="300" y="140" width="560" height="22" fill="#2b2118"/>
  <text x="320" y="147" class="lbl" fill="#f6efe2" font-size="13" font-weight="700">Backend · FastAPI</text>
  <text x="580" y="147" text-anchor="middle" class="lbl" fill="#e0a92e" font-size="12" font-weight="700">Alibaba Cloud · ECS / Function Compute</text>

  <!-- Orchestrator container -->
  <rect x="325" y="185" width="510" height="470" rx="14" fill="#fbf6ea" stroke="#c0392b" stroke-width="1.6" stroke-dasharray="6 4"/>
  <text x="345" y="210" class="lbl" fill="#97281c" font-weight="700">LangGraph — Orquestador secuencial</text>

  <!-- Agents -->
  <g>
    <rect x="360" y="230" width="440" height="66" rx="12" class="agent"/>
    <text x="378" y="258" class="lbl">① Guionista</text>
    <text x="378" y="278" class="sub">decide el evento del día + escribe el guion (continuidad)</text>

    <rect x="360" y="322" width="440" height="66" rx="12" class="agent"/>
    <text x="378" y="350" class="lbl">② Director de Producción</text>
    <text x="378" y="370" class="sub">guion → prompt técnico de video · elige Wan / HappyHorse</text>

    <rect x="360" y="470" width="440" height="66" rx="12" class="agent"/>
    <text x="378" y="498" class="lbl">③ Control de Calidad</text>
    <text x="378" y="518" class="sub">aprueba o pide regenerar — protege el presupuesto de tokens</text>

    <rect x="360" y="562" width="440" height="66" rx="12" class="agent"/>
    <text x="378" y="590" class="lbl">④ Empaquetador</text>
    <text x="378" y="610" class="sub">título viral + thumbnail + descripción lista para publicar</text>
  </g>

  <!-- Video gen inline node -->
  <rect x="360" y="410" width="440" height="44" rx="10" fill="#eef4f7" stroke="#6ba7c4" stroke-width="1.6"/>
  <text x="378" y="437" class="sub" fill="#3d7d99" font-weight="700">🎬 Generación de video (Wan / HappyHorse)</text>

  <!-- vertical flow arrows between agents -->
  <line x1="580" y1="296" x2="580" y2="322" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="388" x2="580" y2="410" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="454" x2="580" y2="470" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="580" y1="536" x2="580" y2="562" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- QA regen loop back to director -->
  <path d="M 800 503 H 830 V 355 H 800" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="838" y="432" class="edge" fill="#97281c" transform="rotate(90 838 432)">regenerar (loop QA→Director)</text>

  <!-- Qwen Cloud -->
  <rect x="940" y="230" width="240" height="120" rx="14" class="cloud"/>
  <text x="1060" y="262" text-anchor="middle" class="title" fill="#2b2118">☁ Qwen Cloud</text>
  <text x="1060" y="284" text-anchor="middle" class="sub">DashScope · OpenAI-compatible</text>
  <text x="1060" y="308" text-anchor="middle" class="sub">Qwen (texto) — agentes 1-4</text>
  <text x="1060" y="328" text-anchor="middle" class="sub">Wan / HappyHorse — video</text>

  <!-- Database -->
  <rect x="940" y="430" width="240" height="90" rx="14" class="store"/>
  <text x="1060" y="462" text-anchor="middle" class="title" fill="#2b2118">🗄 PostgreSQL</text>
  <text x="1060" y="483" text-anchor="middle" class="sub">Alibaba Cloud RDS</text>
  <text x="1060" y="501" text-anchor="middle" class="sub">episodios · personajes</text>

  <!-- OSS -->
  <rect x="940" y="560" width="240" height="90" rx="14" class="store"/>
  <text x="1060" y="592" text-anchor="middle" class="title" fill="#2b2118">📦 Object Storage</text>
  <text x="1060" y="613" text-anchor="middle" class="sub">Alibaba Cloud OSS</text>
  <text x="1060" y="631" text-anchor="middle" class="sub">videos generados</text>

  <!-- Edges: user<->frontend -->
  <line x1="135" y1="200" x2="135" y2="300" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- frontend <-> backend -->
  <line x1="210" y1="330" x2="300" y2="330" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="255" y="322" text-anchor="middle" class="edge">HTTP / REST</text>

  <!-- agents <-> Qwen Cloud -->
  <line x1="800" y1="263" x2="940" y2="285" stroke="#3d7d99" stroke-width="2" marker-end="url(#arrowBlue)" marker-start="url(#arrowBlue)"/>
  <line x1="800" y1="432" x2="940" y2="320" stroke="#3d7d99" stroke-width="2" marker-end="url(#arrowBlue)" marker-start="url(#arrowBlue)"/>

  <!-- backend <-> DB -->
  <line x1="860" y1="475" x2="940" y2="475" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <text x="900" y="467" text-anchor="middle" class="edge">SQLAlchemy</text>

  <!-- backend -> OSS -->
  <line x1="860" y1="600" x2="940" y2="600" stroke="#2b2118" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="900" y="592" text-anchor="middle" class="edge">upload</text>

  <!-- frontend reads OSS video (dashed) -->
  <path d="M 135 390 V 720 H 1060 V 650" fill="none" stroke="#4f7942" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="560" y="713" class="edge" fill="#3a5a30">el frontend reproduce el video servido desde OSS</text>

  <!-- Legend -->
  <text x="40" y="770" class="sub">Flujo: Guionista → Director → Video → QA (loop) → Empaquetador → Episodio persistido + video en OSS → feed Next.js</text>
</svg>

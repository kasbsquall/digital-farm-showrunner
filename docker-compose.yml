services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: farm
      POSTGRES_PASSWORD: farm
      POSTGRES_DB: farm
    ports:
      - "5432:5432"
    volumes:
      - farm_pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://farm:farm@db:5432/farm
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  farm_pgdata:
